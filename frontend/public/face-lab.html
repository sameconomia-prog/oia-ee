<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Face Lab v2 — Perfil femenino procedural</title>
  <style>
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    html,body {
      height: 100%; overflow: hidden;
      color: #f0ede8;
      font-family: 'Sora', -apple-system, sans-serif;
      background: radial-gradient(ellipse at 70% 50%, #0c1840 0%, #050a22 45%, #02050f 100%);
    }
    canvas#canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; }
    #hud { position: fixed; top: 18px; left: 22px; z-index: 50; pointer-events: none; font-size: 11px;
           letter-spacing: 0.18em; text-transform: uppercase; color: rgba(197,164,126,0.7); }
    #hud .title { color: #f0ede8; font-weight: 600; margin-bottom: 4px; letter-spacing: 0.22em; }
    #status { position: fixed; bottom: 14px; left: 22px; z-index: 50;
              font-family: ui-monospace, monospace; font-size: 11px;
              color: rgba(240,237,232,0.4); pointer-events: none; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hud">
    <div class="title">FACE LAB · v2</div>
    <div>perfil femenino procedural — ref: AWS-GenAI-2</div>
  </div>
  <div id="status">construyendo…</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════════════════
   FACE LAB v2 — perfil femenino 100% procedural
   Inspirado en AWS-GenAI-2.jpg: perfil lateral mirando a la izquierda,
   silueta densa + wireframe extendido detrás + bokeh dorado + bloom alto.
   ═══════════════════════════════════════════════════════════════════════ */

// ── Setup Three ──────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const status = document.getElementById('status');
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(38, window.innerWidth/window.innerHeight, 0.01, 100);
camera.position.set(0, 0, 2.4);

const orbit = new THREE.OrbitControls(camera, canvas);
orbit.enableDamping = true; orbit.dampingFactor = 0.08;
orbit.minDistance = 1.0; orbit.maxDistance = 6;

// ── Postprocess ───────────────────────────────────────────────────────────
const composer = new THREE.EffectComposer(renderer);
composer.setSize(window.innerWidth, window.innerHeight);
composer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
composer.addPass(new THREE.RenderPass(scene, camera));
const bloom = new THREE.UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight), 1.8, 0.65, 0.0);
composer.addPass(bloom);

// ── Paleta ────────────────────────────────────────────────────────────────
const PAL = {
  white:  new THREE.Color(0xf0ede8),
  accent: new THREE.Color(0xc5a47e),
  dim:    new THREE.Color(0x7a6248),
  gold:   new THREE.Color(0xd4af37),
};

// ── Bézier helpers ────────────────────────────────────────────────────────
const bz3 = (a,b,c,d,t) => {
  const u = 1-t;
  return u*u*u*a + 3*u*u*t*b + 3*u*t*t*c + t*t*t*d;
};
const bz3p = (P0,P1,P2,P3,t) => [bz3(P0[0],P1[0],P2[0],P3[0],t), bz3(P0[1],P1[1],P2[1],P3[1],t)];

// ── Definición del perfil femenino — 14 segmentos Bézier ──────────────────
// Orientación: cara mirando a la izquierda. -X = frente del rostro.
// Y positivo = arriba (corona).
// Las coordenadas X,Y están en un sistema [-0.6, +0.4] x [-0.7, +0.65].
const PROFILE = [
  // 0 corona → frente
  [[+0.08, +0.62], [-0.10, +0.65], [-0.22, +0.58], [-0.26, +0.48]],
  // 1 frente → ceja prominente
  [[-0.26, +0.48], [-0.30, +0.42], [-0.32, +0.38], [-0.32, +0.34]],
  // 2 ceja → cuenca (retroceso suave)
  [[-0.32, +0.34], [-0.30, +0.30], [-0.28, +0.28], [-0.27, +0.26]],
  // 3 cuenca → puente nasal (sale)
  [[-0.27, +0.26], [-0.30, +0.22], [-0.36, +0.18], [-0.42, +0.13]],
  // 4 puente → punta nariz (respingada — femenina)
  [[-0.42, +0.13], [-0.46, +0.10], [-0.48, +0.07], [-0.48, +0.04]],
  // 5 punta → base nariz (retroceso vertical)
  [[-0.48, +0.04], [-0.46, +0.02], [-0.42, +0.00], [-0.40, -0.01]],
  // 6 base nariz → filtrum
  [[-0.40, -0.01], [-0.39, -0.03], [-0.39, -0.05], [-0.40, -0.07]],
  // 7 filtrum → labio superior (cupido)
  [[-0.40, -0.07], [-0.41, -0.08], [-0.42, -0.09], [-0.42, -0.10]],
  // 8 labio superior → unión labios
  [[-0.42, -0.10], [-0.41, -0.11], [-0.40, -0.12], [-0.39, -0.13]],
  // 9 unión → labio inferior (más prominente)
  [[-0.39, -0.13], [-0.42, -0.15], [-0.43, -0.17], [-0.41, -0.19]],
  // 10 labio inferior → mentolabial sulcus (retraído)
  [[-0.41, -0.19], [-0.38, -0.21], [-0.36, -0.22], [-0.36, -0.24]],
  // 11 sulcus → mentón femenino (pequeño, redondeado)
  [[-0.36, -0.24], [-0.37, -0.27], [-0.36, -0.30], [-0.34, -0.32]],
  // 12 mentón → submental → cuello frente
  [[-0.34, -0.32], [-0.30, -0.36], [-0.26, -0.42], [-0.24, -0.50]],
  // 13 cuello frente → base cuello
  [[-0.24, -0.50], [-0.22, -0.55], [-0.20, -0.62], [-0.18, -0.70]],
];

// Línea trasera de la cabeza (cráneo posterior) — 4 segmentos
const SKULL_BACK = [
  // top corona → atrás
  [[+0.08, +0.62], [+0.18, +0.58], [+0.24, +0.48], [+0.24, +0.36]],
  // atrás-medio
  [[+0.24, +0.36], [+0.22, +0.22], [+0.18, +0.10], [+0.14, +0.00]],
  // base craneo → nuca
  [[+0.14, +0.00], [+0.10, -0.06], [+0.06, -0.10], [+0.02, -0.12]],
  // nuca → cuello atrás
  [[+0.02, -0.12], [-0.02, -0.16], [-0.06, -0.30], [-0.08, -0.50]],
];

/* ─────────────────────────────────────────────────────────────────────────
   GENERADOR PRINCIPAL — perfil femenino + detalles + wireframe extendido
   ───────────────────────────────────────────────────────────────────────── */
function buildFaceParticles(N, params) {
  const positions = [];
  const sizes = [];
  const colors = [];
  const linePairs = [];
  let idx = 0;

  const push = (x, y, z, c, s) => {
    positions.push(x, y, z);
    colors.push(c.r, c.g, c.b);
    sizes.push(s);
    return idx++;
  };

  /* ── 1. SILUETA densa (perfil) — la línea principal que define la cara ── */
  // Repartimos puntos por segmento proporcional a su largo
  const samplesPerSilSeg = Math.floor(params.silDensity / PROFILE.length);
  const silIndices = [];
  for (let i = 0; i < PROFILE.length; i++) {
    const seg = PROFILE[i];
    for (let k = 0; k < samplesPerSilSeg; k++) {
      const t = k / (samplesPerSilSeg - 1);
      const [x, y] = bz3p(seg[0], seg[1], seg[2], seg[3], t);
      // jitter mínimo para que la línea sea nítida
      const jx = (Math.random() - 0.5) * 0.004;
      const jy = (Math.random() - 0.5) * 0.004;
      const z = (Math.random() - 0.5) * 0.04;
      const id = push(x + jx, y + jy, z, PAL.white, 0.005 + Math.random() * 0.004);
      silIndices.push(id);
    }
  }

  /* ── 2. LINEA TRASERA DE LA CABEZA (skull back) ── */
  const samplesPerSkull = Math.floor(params.skullDensity / SKULL_BACK.length);
  const skullIndices = [];
  for (let i = 0; i < SKULL_BACK.length; i++) {
    const seg = SKULL_BACK[i];
    for (let k = 0; k < samplesPerSkull; k++) {
      const t = k / (samplesPerSkull - 1);
      const [x, y] = bz3p(seg[0], seg[1], seg[2], seg[3], t);
      const jx = (Math.random() - 0.5) * 0.006;
      const jy = (Math.random() - 0.5) * 0.006;
      const z = -0.03 + (Math.random() - 0.5) * 0.05;
      const id = push(x + jx, y + jy, z, PAL.accent, 0.005 + Math.random() * 0.004);
      skullIndices.push(id);
    }
  }

  /* ── 3. DETALLES FACIALES INTERIORES ── */

  // 3a. Ojo almendra
  const eyeCx = -0.20, eyeCy = +0.27;
  const eyeRX = 0.040, eyeRY = 0.014;
  // contorno almendra (elongada hacia exterior)
  for (let j = 0; j < 110; j++) {
    const t = (j/110) * Math.PI * 2;
    const ax = Math.cos(t), ay = Math.sin(t);
    // forma almendra: más amplia arriba que abajo
    const ry = ay > 0 ? eyeRY * 1.3 : eyeRY * 0.65;
    const x = eyeCx + ax * eyeRX;
    const y = eyeCy + ay * ry;
    push(x, y, 0.012, PAL.white, 0.004);
  }
  // iris
  for (let j = 0; j < 80; j++) {
    const t = (j/80) * Math.PI * 2;
    const r = 0.013;
    push(eyeCx + Math.cos(t)*r, eyeCy + Math.sin(t)*r, 0.014, PAL.accent, 0.004);
  }
  // pupila densa
  for (let j = 0; j < 40; j++) {
    const a = Math.random()*Math.PI*2;
    const r = Math.random() * 0.006;
    push(eyeCx + Math.cos(a)*r, eyeCy + Math.sin(a)*r, 0.015, PAL.white, 0.005);
  }
  // catchlight (brillo)
  for (let j = 0; j < 18; j++) {
    push(eyeCx - 0.005 + (Math.random()-0.5)*0.003,
         eyeCy + 0.006 + (Math.random()-0.5)*0.003,
         0.016, PAL.white, 0.006);
  }
  // pestañas superiores (arco)
  for (let j = 0; j < 90; j++) {
    const t = j/90;
    const x = bz3(eyeCx - eyeRX, eyeCx - 0.015, eyeCx + 0.020, eyeCx + eyeRX*0.9, t);
    const y = bz3(eyeCy + eyeRY*1.3, eyeCy + 0.025, eyeCy + 0.024, eyeCy + eyeRY, t);
    push(x, y + Math.random()*0.004, 0.012, PAL.white, 0.003);
  }
  // pestañas inferiores
  for (let j = 0; j < 40; j++) {
    const t = j/40;
    const x = bz3(eyeCx - eyeRX*0.85, eyeCx - 0.010, eyeCx + 0.010, eyeCx + eyeRX*0.8, t);
    const y = bz3(eyeCy - eyeRY*0.65, eyeCy - 0.018, eyeCy - 0.018, eyeCy - eyeRY*0.5, t);
    push(x, y - Math.random()*0.004, 0.011, PAL.white, 0.003);
  }

  // 3b. Ceja arqueada (delgada, elevada — femenina)
  for (let j = 0; j < 130; j++) {
    const t = j/130;
    const x = bz3(-0.30, -0.24, -0.16, -0.10, t);
    const y = bz3(+0.31, +0.34, +0.33, +0.30, t);
    push(x, y + (Math.random()-0.5)*0.004, 0.010, PAL.white, 0.003);
  }

  // 3c. Pómulo (línea diagonal sutil de ojo a mejilla)
  for (let j = 0; j < 100; j++) {
    const t = j/100;
    const x = bz3(eyeCx - 0.02, -0.18, -0.20, -0.22, t);
    const y = bz3(eyeCy - 0.04, +0.10, +0.04, -0.04, t);
    push(x, y, 0.006, PAL.accent, 0.005);
  }

  // 3d. Labio superior con cupido (forma lateral)
  for (let j = 0; j < 90; j++) {
    const t = j/90;
    const x = bz3(-0.43, -0.40, -0.36, -0.30, t);
    const y = bz3(-0.10, -0.085, -0.08, -0.075, t);
    push(x, y, 0.009, PAL.white, 0.004);
  }
  // labio inferior (más prominente)
  for (let j = 0; j < 70; j++) {
    const t = j/70;
    const x = bz3(-0.41, -0.38, -0.34, -0.30, t);
    const y = bz3(-0.16, -0.155, -0.15, -0.13, t);
    push(x, y, 0.009, PAL.white, 0.004);
  }
  // línea entre labios (boca cerrada)
  for (let j = 0; j < 60; j++) {
    const t = j/60;
    const x = bz3(-0.42, -0.40, -0.36, -0.30, t);
    const y = bz3(-0.13, -0.125, -0.12, -0.115, t);
    push(x, y, 0.010, PAL.accent, 0.003);
  }

  // 3e. Filtrum (canalito nariz → labio)
  for (let j = 0; j < 26; j++) {
    const t = j/26;
    push(-0.40, -0.01 - t*0.08, 0.009, PAL.accent, 0.003);
  }

  // 3f. Mandíbula (línea sutil oreja → mentón)
  for (let j = 0; j < 80; j++) {
    const t = j/80;
    const x = bz3(+0.10, -0.05, -0.20, -0.34, t);
    const y = bz3(-0.06, -0.18, -0.26, -0.30, t);
    push(x, y, 0.005, PAL.accent, 0.004);
  }

  /* ── 4. VOLUMEN DE LA CARA (relleno con bias hacia rasgos) ── */
  // Pómulo volumétrico (bloom intenso aquí = sensación de relieve)
  for (let j = 0; j < 1200; j++) {
    const u = Math.random(), v = Math.random();
    const x = -0.20 + (u - 0.5) * 0.14;
    const y = +0.10 + (v - 0.5) * 0.18;
    push(x, y, 0.005 + Math.random() * 0.018, PAL.accent, 0.012);
  }
  // Mejilla
  for (let j = 0; j < 800; j++) {
    const x = -0.22 + (Math.random() - 0.5) * 0.16;
    const y = +0.00 + (Math.random() - 0.5) * 0.18;
    push(x, y, 0.004 + Math.random() * 0.012, PAL.dim, 0.014);
  }
  // Frente
  for (let j = 0; j < 700; j++) {
    const x = -0.22 + (Math.random() - 0.5) * 0.18;
    const y = +0.40 + Math.random() * 0.18;
    push(x, y, 0.003 + Math.random() * 0.010, PAL.dim, 0.014);
  }
  // Volumen labios
  for (let j = 0; j < 350; j++) {
    const t = Math.random();
    const lx = -0.42 + t * 0.16;
    const ly = -0.13 + (Math.random() - 0.5) * 0.06;
    push(lx, ly, 0.008 + Math.random() * 0.004, PAL.accent, 0.005);
  }
  // Volumen nariz
  for (let j = 0; j < 350; j++) {
    const t = Math.random();
    const x = -0.30 - t * 0.18 + (Math.random() - 0.5) * 0.03;
    const y = +0.13 - t * 0.12;
    push(x, y, 0.008, PAL.accent, 0.005);
  }
  // Cuello
  for (let j = 0; j < 600; j++) {
    const x = -0.18 + (Math.random() - 0.5) * 0.10;
    const y = -0.45 - Math.random() * 0.30;
    push(x, y, 0.002, PAL.dim, 0.014);
  }

  /* ── 5. WIREFRAME EXTENDIDO DETRÁS DE LA CABEZA (efecto data/IA) ── */
  // Puntos en volumen elipsoidal extendiéndose desde la cabeza hacia atrás-arriba
  const wireIndices = [];
  const wireN = params.wireframeCount;
  for (let i = 0; i < wireN; i++) {
    // distribución gaussiana con bias hacia +X (atrás de la cabeza) y +Y (arriba)
    const a = Math.random() * Math.PI * 2;
    const r = Math.random();
    // forma de "nube" trasera
    const cx = +0.30 + Math.random() * 0.55;
    const cy = +0.10 + (Math.random() - 0.3) * 0.7;
    const cz = -0.05 + (Math.random() - 0.5) * 0.30;
    // jitter angular
    const jx = Math.cos(a) * r * 0.20;
    const jy = Math.sin(a) * r * 0.15;
    const x = cx + jx;
    const y = cy + jy;
    const z = cz;
    const c = Math.random() < 0.7 ? PAL.accent : PAL.gold;
    const id = push(x, y, z, c, 0.006 + Math.random() * 0.008);
    wireIndices.push(id);
  }
  // k-NN lines entre los puntos del wireframe
  if (params.wireframeLines) {
    const cellSize = 0.10;
    const cellKey = (x,y,z) => `${Math.floor(x/cellSize)},${Math.floor(y/cellSize)},${Math.floor(z/cellSize)}`;
    const grid = new Map();
    for (const id of wireIndices) {
      const k = cellKey(positions[id*3], positions[id*3+1], positions[id*3+2]);
      if (!grid.has(k)) grid.set(k, []);
      grid.get(k).push(id);
    }
    const KNN_MAX_DIST_SQ = 0.18 * 0.18;
    for (const id of wireIndices) {
      const x = positions[id*3], y = positions[id*3+1], z = positions[id*3+2];
      const cx = Math.floor(x/cellSize), cy = Math.floor(y/cellSize), cz = Math.floor(z/cellSize);
      const cands = [];
      for (let dx = -1; dx <= 1; dx++)
        for (let dy = -1; dy <= 1; dy++)
          for (let dz = -1; dz <= 1; dz++) {
            const arr = grid.get(`${cx+dx},${cy+dy},${cz+dz}`);
            if (arr) for (const j of arr) {
              if (j === id) continue;
              const ddx = positions[j*3]-x, ddy = positions[j*3+1]-y, ddz = positions[j*3+2]-z;
              const d2 = ddx*ddx + ddy*ddy + ddz*ddz;
              if (d2 < KNN_MAX_DIST_SQ) cands.push([j, d2]);
            }
          }
      cands.sort((a,b) => a[1]-b[1]);
      const taken = cands.slice(0, params.wireframeKNN);
      for (const [j] of taken) linePairs.push(id, j);
    }
  }

  /* ── 6. HALO DIFUSO alrededor de la cara ── */
  for (let j = 0; j < 1500; j++) {
    const a = Math.random() * Math.PI * 2;
    const r = 0.55 + Math.random() * 0.45;
    push(-0.18 + Math.cos(a) * r * 0.7,
         +0.05 + Math.sin(a) * r * 0.65,
         -0.10 + (Math.random() - 0.5) * 0.10,
         PAL.dim, 0.018);
  }

  /* ── 7. DUST / data particles flotantes ── */
  for (let j = 0; j < 800; j++) {
    push((Math.random() - 0.5) * 1.6,
         (Math.random() - 0.5) * 1.4,
         -0.08 + (Math.random() - 0.5) * 0.16,
         Math.random() < 0.4 ? PAL.gold : PAL.accent,
         0.007 + Math.random() * 0.008);
  }

  return {
    positions: new Float32Array(positions),
    colors:    new Float32Array(colors),
    sizes:     new Float32Array(sizes),
    linePairs,
  };
}

/* ─────────────────────────────────────────────────────────────────────────
   MATERIALES Y ESCENA
   ───────────────────────────────────────────────────────────────────────── */
const pointsVtx = `
  attribute float aSize;
  attribute vec3 aColor;
  varying vec3 vColor;
  uniform float uTime;
  uniform float uPxRatio;
  uniform float uOpacity;
  uniform float uSizeMul;
  varying float vAlpha;
  void main() {
    vColor = aColor;
    vAlpha = uOpacity;
    vec3 p = position;
    p.x += sin(uTime*0.5 + position.y*1.7) * 0.004;
    p.y += sin(uTime*0.4 + position.x*1.3) * 0.003;
    vec4 mv = modelViewMatrix * vec4(p, 1.0);
    gl_Position = projectionMatrix * mv;
    gl_PointSize = aSize * uSizeMul * (420.0 * uPxRatio / -mv.z);
  }`;
const pointsFrg = `
  varying vec3 vColor;
  varying float vAlpha;
  void main() {
    vec2 c = 2.0 * gl_PointCoord - 1.0;
    float r2 = dot(c,c);
    if (r2 > 1.0) discard;
    float glow = exp(-r2 * 2.6);
    gl_FragColor = vec4(vColor * (0.6 + glow * 0.7), glow * vAlpha);
  }`;

const pointsMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 }, uPxRatio: { value: renderer.getPixelRatio() },
    uOpacity: { value: 1.0 }, uSizeMul: { value: 1.0 },
  },
  vertexShader: pointsVtx, fragmentShader: pointsFrg,
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
});

const linesMat = new THREE.LineBasicMaterial({
  color: 0xc5a47e, transparent: true, opacity: 0.30,
  blending: THREE.AdditiveBlending, depthWrite: false,
});

const bokehVtx = `
  attribute float aSize;
  attribute vec3 aColor;
  varying vec3 vColor;
  uniform float uTime, uPxRatio, uOpacity, uSizeMul;
  varying float vAlpha;
  void main() {
    vColor = aColor; vAlpha = uOpacity;
    vec3 p = position;
    p.x += sin(uTime*0.18 + position.y*1.5) * 0.10;
    p.y += sin(uTime*0.22 + position.x*1.2) * 0.08;
    vec4 mv = modelViewMatrix * vec4(p, 1.0);
    gl_Position = projectionMatrix * mv;
    gl_PointSize = aSize * uSizeMul * (560.0 * uPxRatio / -mv.z);
  }`;
const bokehFrg = `
  varying vec3 vColor;
  varying float vAlpha;
  void main() {
    vec2 c = gl_PointCoord - 0.5;
    float r = length(c) * 2.0;
    if (r > 1.0) discard;
    float a = exp(-r*r * 3.0) * vAlpha;
    gl_FragColor = vec4(vColor, a);
  }`;
const bokehMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 }, uPxRatio: { value: renderer.getPixelRatio() },
              uOpacity: { value: 0.55 }, uSizeMul: { value: 1.0 } },
  vertexShader: bokehVtx, fragmentShader: bokehFrg,
  transparent: true, blending: THREE.AdditiveBlending,
  depthWrite: false, depthTest: false,
});

let pointsObj = null, linesObj = null, bokehObj = null;
const pointsGeom = new THREE.BufferGeometry();
const linesGeom  = new THREE.BufferGeometry();

const params = {
  silDensity: 6500,         // puntos en silueta del rostro
  skullDensity: 2500,       // puntos en línea trasera del cráneo
  wireframeCount: 1800,     // puntos en wireframe extendido
  wireframeLines: true,
  wireframeKNN: 3,
  scale: 1.4,
  rotationY: 0,             // ya está dibujado en perfil — 0 = lateral natural
  rotationX: 0,
  swayAmpY: 0.04,
  swayAmpX: 0.02,
  swaySpeed: 0.45,
  mouseInfluence: 0.4,
  positionX: 0.55,          // mover hacia la derecha del frame
  // bokeh
  bokehCount: 220,
  bokehSize: 1.0,
  bokehOpacity: 0.55,
  // bloom
  bloomStrength: 1.8,
  bloomRadius: 0.65,
  bloomThreshold: 0.0,
  // apariencia
  pointSizeMul: 1.0,
  pointOpacity: 1.0,
  linesOpacity: 0.30,
  showPoints: true,
  showLines: true,
  showBokeh: true,
  // acción
  rebuild: () => buildAll(),
};

function buildFace() {
  const data = buildFaceParticles(0, params);
  pointsGeom.setAttribute('position', new THREE.BufferAttribute(data.positions, 3));
  pointsGeom.setAttribute('aColor',   new THREE.BufferAttribute(data.colors, 3));
  pointsGeom.setAttribute('aSize',    new THREE.BufferAttribute(data.sizes, 1));
  if (pointsObj) scene.remove(pointsObj);
  pointsObj = new THREE.Points(pointsGeom, pointsMat);
  scene.add(pointsObj);

  // líneas (k-NN del wireframe trasero) — usan los mismos índices del points buffer
  const lineCount = data.linePairs.length;
  const linePos = new Float32Array(lineCount * 3);
  for (let k = 0; k < lineCount; k++) {
    const i = data.linePairs[k];
    linePos[k*3]   = data.positions[i*3];
    linePos[k*3+1] = data.positions[i*3+1];
    linePos[k*3+2] = data.positions[i*3+2];
  }
  linesGeom.setAttribute('position', new THREE.BufferAttribute(linePos, 3));
  if (linesObj) scene.remove(linesObj);
  linesObj = new THREE.LineSegments(linesGeom, linesMat);
  scene.add(linesObj);

  status.textContent =
    `${data.positions.length/3} partículas · ${lineCount/2} k-NN edges · perfil procedural`;
}

function buildBokeh() {
  if (bokehObj) scene.remove(bokehObj);
  const N = params.bokehCount;
  const positions = new Float32Array(N * 3);
  const sizes = new Float32Array(N);
  const colors = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    // dispersos en plano frontal, mayoría en lado de la cara (x positivo en world)
    const sideBias = Math.random() < 0.65 ? 1 : -1;
    positions[i*3]   = sideBias * (0.20 + Math.random() * 1.2);
    positions[i*3+1] = (Math.random() - 0.5) * 1.6;
    positions[i*3+2] = -0.15 - Math.random() * 1.4;
    sizes[i] = 0.04 + Math.random() * 0.16;
    const r = Math.random();
    let c;
    if (r < 0.40)      c = PAL.gold;
    else if (r < 0.75) c = PAL.accent;
    else if (r < 0.90) c = PAL.white;
    else               c = PAL.dim;
    colors[i*3]   = c.r; colors[i*3+1] = c.g; colors[i*3+2] = c.b;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  g.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
  g.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));
  bokehObj = new THREE.Points(g, bokehMat);
  scene.add(bokehObj);
}

function buildAll() {
  buildFace();
  buildBokeh();
  applyTransform();
  applyVisibility();
}

function applyTransform() {
  if (!pointsObj) return;
  const baseY = params.rotationY * Math.PI / 180;
  const baseX = params.rotationX * Math.PI / 180;
  pointsObj.scale.setScalar(params.scale);
  pointsObj.position.x = params.positionX;
  if (linesObj) {
    linesObj.scale.setScalar(params.scale);
    linesObj.position.x = params.positionX;
  }
}
function applyVisibility() {
  if (pointsObj) pointsObj.visible = params.showPoints;
  if (linesObj)  linesObj.visible  = params.showLines;
  if (bokehObj)  bokehObj.visible  = params.showBokeh;
  pointsMat.uniforms.uOpacity.value = params.pointOpacity;
  pointsMat.uniforms.uSizeMul.value = params.pointSizeMul;
  linesMat.opacity = params.linesOpacity;
  bokehMat.uniforms.uOpacity.value = params.bokehOpacity;
  bokehMat.uniforms.uSizeMul.value = params.bokehSize;
}

/* ─────────────────────────────────────────────────────────────────────────
   dat.gui
   ───────────────────────────────────────────────────────────────────────── */
const gui = new dat.GUI({ width: 280 });

const fProfile = gui.addFolder('Perfil (silueta)'); fProfile.open();
fProfile.add(params, 'silDensity', 1000, 15000, 100).name('Puntos silueta').onChange(buildFace);
fProfile.add(params, 'skullDensity', 500, 5000, 50).name('Puntos cráneo').onChange(buildFace);

const fWire = gui.addFolder('Wireframe trasero (data IA)'); fWire.open();
fWire.add(params, 'wireframeCount', 0, 5000, 50).name('Puntos').onChange(buildFace);
fWire.add(params, 'wireframeLines').name('Mostrar líneas').onChange(buildFace);
fWire.add(params, 'wireframeKNN', 1, 6, 1).name('Vecinos k-NN').onChange(buildFace);
fWire.add(params, 'linesOpacity', 0, 1, 0.02).name('Opacidad líneas').onChange(applyVisibility);

const fAppear = gui.addFolder('Apariencia'); fAppear.open();
fAppear.add(params, 'pointSizeMul', 0.3, 3, 0.05).name('Tamaño punto').onChange(applyVisibility);
fAppear.add(params, 'pointOpacity', 0, 1, 0.02).name('Opacidad puntos').onChange(applyVisibility);
fAppear.add(params, 'showPoints').name('Mostrar puntos').onChange(applyVisibility);
fAppear.add(params, 'showLines').name('Mostrar líneas').onChange(applyVisibility);
fAppear.add(params, 'showBokeh').name('Mostrar bokeh').onChange(applyVisibility);

const fBokeh = gui.addFolder('Bokeh'); fBokeh.open();
fBokeh.add(params, 'bokehCount', 0, 800, 10).name('Cantidad').onChange(buildBokeh);
fBokeh.add(params, 'bokehSize', 0.2, 3, 0.05).name('Tamaño').onChange(applyVisibility);
fBokeh.add(params, 'bokehOpacity', 0, 1, 0.02).name('Opacidad').onChange(applyVisibility);

const fBloom = gui.addFolder('Bloom'); fBloom.open();
fBloom.add(params, 'bloomStrength', 0, 3, 0.05).onChange(v => bloom.strength = v);
fBloom.add(params, 'bloomRadius', 0, 1.5, 0.02).onChange(v => bloom.radius = v);
fBloom.add(params, 'bloomThreshold', 0, 1, 0.01).onChange(v => bloom.threshold = v);

const fView = gui.addFolder('Vista / animación');
fView.add(params, 'positionX', -1.5, 1.5, 0.05).name('Posición X').onChange(applyTransform);
fView.add(params, 'scale', 0.3, 4, 0.05).onChange(applyTransform);
fView.add(params, 'rotationY', -180, 180, 1).name('Rot Y');
fView.add(params, 'rotationX', -45, 45, 1).name('Rot X');
fView.add(params, 'swayAmpY', 0, 0.3, 0.005).name('Sway Y');
fView.add(params, 'swayAmpX', 0, 0.2, 0.005).name('Sway X');
fView.add(params, 'swaySpeed', 0, 2, 0.05).name('Velocidad');
fView.add(params, 'mouseInfluence', 0, 2, 0.05).name('Mouse');

gui.add(params, 'rebuild').name('▶ Reconstruir todo');

/* ─────────────────────────────────────────────────────────────────────────
   Mouse parallax + animate
   ───────────────────────────────────────────────────────────────────────── */
const mouse = { x: 0, y: 0 };
window.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX/window.innerWidth) * 2 - 1;
  mouse.y = (e.clientY/window.innerHeight) * 2 - 1;
}, { passive: true });

const clock = new THREE.Clock();
let smoothY = 0, smoothX = 0;
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  pointsMat.uniforms.uTime.value = t;
  bokehMat.uniforms.uTime.value = t;

  if (pointsObj) {
    const baseY = params.rotationY * Math.PI / 180;
    const baseX = params.rotationX * Math.PI / 180;
    const tgtY = baseY + Math.sin(t * params.swaySpeed) * params.swayAmpY +
                 mouse.x * params.swayAmpY * params.mouseInfluence;
    const tgtX = baseX + Math.cos(t * params.swaySpeed * 0.7) * params.swayAmpX +
                 mouse.y * params.swayAmpX * params.mouseInfluence * 0.6;
    smoothY += (tgtY - smoothY) * 0.06;
    smoothX += (tgtX - smoothX) * 0.06;
    pointsObj.rotation.y = smoothY;
    pointsObj.rotation.x = smoothX;
    if (linesObj) {
      linesObj.rotation.y = smoothY;
      linesObj.rotation.x = smoothX;
    }
  }
  orbit.update();
  composer.render();
}

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  composer.setSize(w, h);
  bloom.resolution.set(w, h);
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
});

// Inicializar bloom
bloom.strength = params.bloomStrength;
bloom.radius = params.bloomRadius;
bloom.threshold = params.bloomThreshold;

buildAll();
animate();
</script>
</body>
