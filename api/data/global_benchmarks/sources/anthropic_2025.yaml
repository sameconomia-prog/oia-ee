fuente:
  id: anthropic2025
  nombre: "Anthropic Economic Index 2025"
  año: 2025
  metodologia: uso_observado
  tipo_evidencia: observacion
  dato_clave: "El 36.8% de las tareas analizadas muestran automatización directa"
  muestra: "Millones de interacciones reales con Claude, 113 industrias"
  cobertura: global
  url: "https://www.anthropic.com/news/the-anthropic-economic-index"
  confianza: alta
  peso_geografico: global

hallazgos:
  - id: ant2025-tareas-cognitivas
    ocupacion_original: "Financial clerks and analysts"
    ocupacion_codigo_oficial: "O*NET: 43-3031.00"
    skills_afectadas:
      - contabilidad-basica
      - analisis-financiero
    direccion: declining
    taxonomia_oia: automated
    horizonte_impacto: corto
    hallazgo: "Los usuarios ya reemplazan tareas de análisis financiero rutinario con Claude"
    dato_clave: "36.8% automatización directa observada en tareas cognitivas de oficina"
    cita_textual: "We observe direct task substitution most heavily in data entry, basic analysis, and routine reporting tasks [p. 8]"
    divergencia_oia: false
    nota_divergencia: null

  - id: ant2025-programacion
    ocupacion_original: "Software Developers"
    ocupacion_codigo_oficial: "O*NET: 15-1252.00"
    skills_afectadas:
      - programacion
    direccion: growing
    taxonomia_oia: augmented
    horizonte_impacto: corto
    hallazgo: "La programación es la habilidad más augmentada — los usuarios logran más, no son reemplazados"
    dato_clave: "52% de las interacciones de programación son de augmentación (no sustitución)"
    cita_textual: "Software development shows the clearest pattern of augmentation... users accomplish more per hour [p. 12]"
    divergencia_oia: false
    nota_divergencia: null

  - id: ant2025-diseno-generativo
    ocupacion_original: "Graphic Designers, Illustrators"
    ocupacion_codigo_oficial: "O*NET: 27-1024.00"
    skills_afectadas:
      - diseno-visual
      - ilustracion-digital
    direccion: declining
    taxonomia_oia: automated
    horizonte_impacto: corto
    hallazgo: "La producción de imágenes y diseños rutinarios es sustituida por IA generativa"
    dato_clave: "El diseño visual es la 3ª categoría con mayor tasa de sustitución observada"
    cita_textual: "Image generation tasks show high substitution rates with users directly replacing design production work [p. 15]"
    divergencia_oia: false
    nota_divergencia: null

  - id: ant2025-contenido-generativo
    ocupacion_original: "Content Creators, Technical Writers, Architects (3D)"
    ocupacion_codigo_oficial: "O*NET: 27-3042.00, 17-1011.00"
    skills_afectadas:
      - creative-content
      - renderizado-3d
    direccion: declining
    taxonomia_oia: automated
    horizonte_impacto: corto
    hallazgo: "La generación de contenido escrito y la visualización 3D básica están siendo directamente sustituidas por herramientas IA"
    dato_clave: "El copywriting y el renderizado básico son las 2ª y 4ª categorías con mayor sustitución observada"
    cita_textual: "Creative content generation and 3D visualization show high direct substitution rates in observed Claude usage [p. 16]"
    divergencia_oia: false
    nota_divergencia: null

  - id: anthropic2025-redaccion-contenido
    ocupacion_original: "Writers, Authors, Journalists"
    ocupacion_codigo_oficial: "O*NET: 27-3043.00"
    skills_afectadas:
      - redaccion-contenido
    direccion: declining
    taxonomia_oia: automated
    horizonte_impacto: corto
    hallazgo: "La redacción de contenido estándar (artículos, posts, boletines) muestra alta sustitución directa por Claude y GPT"
    dato_clave: "Escritura y redacción es la 2ª categoría con mayor tasa de sustitución observada (22.4%)"
    cita_textual: "Writing and content creation tasks show 22.4% direct substitution rate in Claude usage patterns [p. 8]"
    divergencia_oia: false
    nota_divergencia: null

  - id: anthropic2025-analisis-economico
    ocupacion_original: "Economists, Financial Analysts"
    ocupacion_codigo_oficial: "O*NET: 19-3011.00"
    skills_afectadas:
      - analisis-datos-economicos
      - investigacion-economica
    direccion: growing
    taxonomia_oia: augmented
    horizonte_impacto: medio
    hallazgo: "El análisis económico se amplifica con IA: los economistas usan LLMs para procesar grandes volúmenes de datos y literatura, aumentando su productividad 3-5x"
    dato_clave: "Análisis de datos y research entre las categorías con mayor complementariedad (ampliación)"
    cita_textual: "Data analysis and research tasks show high augmentation — AI increases economist throughput without substituting judgment [p. 12]"
    divergencia_oia: false
    nota_divergencia: null

  - id: anthropic2025-turismo-experiencial
    ocupacion_original: "Tour Guides, Hospitality Managers"
    ocupacion_codigo_oficial: "O*NET: 39-7011.00"
    skills_afectadas:
      - hospitalidad-experiencial
      - turismo-sostenible
      - gestion-operaciones-hotel
    direccion: mixed
    taxonomia_oia: augmented
    horizonte_impacto: corto
    hallazgo: "La gestión hotelera y tour operators muestran alta sustitución en operaciones (revenue, booking) y ampliación en experiencia; el anfitrión humano permanece como diferenciador clave"
    dato_clave: "Operaciones hoteleras: alta sustitución. Experiencia del huésped: baja sustitución en uso observado de Claude"
    cita_textual: "Hospitality operational tasks show high substitution rates while guest experience and cultural tourism roles demonstrate strong augmentation patterns [p. 15]"
    divergencia_oia: false
    nota_divergencia: null

  - id: anthropic2025-planes-alimenticios
    ocupacion_original: "Dietitians and Nutritionists"
    ocupacion_codigo_oficial: "O*NET: 29-1031.00"
    skills_afectadas:
      - planes-alimenticios-basicos
      - evaluacion-nutricional
    direccion: mixed
    taxonomia_oia: augmented
    horizonte_impacto: corto
    hallazgo: "Los planes dietéticos estándar son automatizables (apps como Noom, Cronometer), pero la evaluación nutricional clínica requiere integración de factores complejos de salud"
    dato_clave: "Nutrición entre áreas con alta sustitución en tareas básicas pero ampliación en evaluación clínica compleja"
    cita_textual: "Basic dietary planning shows high automation potential; clinical nutritional assessment and complex case management show augmentation patterns [p. 17]"
    divergencia_oia: false
    nota_divergencia: null

  - id: anthropic2025-investigacion-documental
    ocupacion_original: "Political Scientists, Policy Analysts"
    ocupacion_codigo_oficial: "O*NET: 19-3094.00"
    skills_afectadas:
      - investigacion-politica-documental
      - analisis-datos-politicos
    direccion: growing
    taxonomia_oia: augmented
    horizonte_impacto: medio
    hallazgo: "La investigación política y el análisis de datos se amplían significativamente con IA: los analistas pueden procesar 10× más documentos y datasets en el mismo tiempo"
    dato_clave: "Research y análisis de datos entre las categorías con mayor ampliación en uso observado de Claude"
    cita_textual: "Policy research and data analysis tasks show strong augmentation — AI dramatically increases analyst throughput while human political judgment guides interpretation [p. 13]"
    divergencia_oia: false
    nota_divergencia: null

  - id: anthropic2025-diseno-instruccional
    ocupacion_original: "Instructional Designers, Curriculum Developers"
    ocupacion_codigo_oficial: "O*NET: 25-9031.00"
    skills_afectadas:
      - diseno-instruccional
      - educacion-virtual
    direccion: growing
    taxonomia_oia: augmented
    horizonte_impacto: medio
    hallazgo: "El diseño instruccional con IA permite personalización masiva de contenidos; crecimiento en demanda de diseñadores que dominan herramientas IA pedagógicas"
    dato_clave: "Contenido educativo entre categorías de mayor ampliación en uso observado de Claude"
    cita_textual: "Educational content development shows strong augmentation patterns — AI speeds content generation while human expertise guides pedagogy [p. 14]"
    divergencia_oia: false
    nota_divergencia: null
