version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: oiaee
      POSTGRES_PASSWORD: oiaee_dev
      POSTGRES_DB: oia_ee
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oiaee -d oia_ee"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
